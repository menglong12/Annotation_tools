name: Build Windows Executable

on:
  workflow_call:  # 允许被其他工作流调用
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (optional)'
        required: false
        default: ''
      version_type:
        description: 'Version increment type (if no custom version)'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  # 如果需要上传到 Release
  packages: write  # 如果上传包文件

# env:
#   APP_NAME: PetkitAnnotationTool
#   VERSION: 1.0.0

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取所有标签历史
      
      - name: Get version from tag or generate
        id: version
        run: |
          # 检查是否由 tag 触发
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # 从 tag 获取版本号
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG_NAME#v}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
            echo "Using tag version: $VERSION"
          else
            # 手动触发时，获取最新版本并递增
            LATEST_TAG=$(git tag -l "v*" | sort -V | tail -n1)
            
            if [ -z "$LATEST_TAG" ]; then
              BASE_VERSION="1.0.0"
            else
              BASE_VERSION=${LATEST_TAG#v}
            fi
            
            # 如果手动指定了版本号
            if [ -n "${{ github.event.inputs.version }}" ]; then
              NEW_VERSION="${{ github.event.inputs.version }}"
            else
              # 解析版本号并递增
              MAJOR=$(echo $BASE_VERSION | cut -d. -f1)
              MINOR=$(echo $BASE_VERSION | cut -d. -f2)
              PATCH=$(echo $BASE_VERSION | cut -d. -f3)
              
              TYPE="${{ github.event.inputs.version_type }}"
              if [ "$TYPE" == "major" ]; then
                NEW_VERSION="$((MAJOR + 1)).0.0"
              elif [ "$TYPE" == "minor" ]; then
                NEW_VERSION="$MAJOR.$((MINOR + 1)).0"
              else
                NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
              fi
            fi
            
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "tag_name=v$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "Generated version: $NEW_VERSION"
          fi
      - name: Create and push tag (for manual trigger)
        if: github.event_name == 'workflow_dispatch' && !startsWith(github.ref, 'refs/tags/')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag_name }}
          git push origin ${{ steps.version.outputs.tag_name }}
          echo "Created and pushed tag: ${{ steps.version.outputs.tag_name }}"

  build-windows:
    runs-on: windows-latest
    needs: get-version
    env:
      APP_NAME: PetkitAnnotationTool
      APP_VERSION: ${{ needs.get-version.outputs.version }}
    
    strategy:
      matrix:
        python-version: ['3.11']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~\AppData\Local\pip\Cache
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PyQt5 opencv-python numpy
        if (Test-Path requirements.txt) {
          pip install -r requirements.txt
        }
    
    - name: Create icons directory if not exists
      run: |
        if (!(Test-Path icons)) {
          New-Item -ItemType Directory -Path icons
        }
    
    # - name: Build with PyInstaller
    #   run: |
    #     pyinstaller --name=${{ env.APP_NAME }} `
    #       --windowed `
    #       --onefile `
    #       --add-data="icons;icons" `
    #       --add-data="config;config" `
    #       --add-data="modes;modes" `
    #       --add-data="core;core" `
    #       --add-data="utils;utils" `
    #       --add-data="$env:pythonLocation\Lib\site-packages\PyQt5\Qt5\plugins\platforms;platforms" `
    #       --hidden-import=PyQt5.QtCore `
    #       --hidden-import=PyQt5.QtGui `
    #       --hidden-import=PyQt5.QtWidgets `
    #       --hidden-import=cv2 `
    #       --hidden-import=numpy `
    #       --hidden-import=json `
    #       --hidden-import=imghdr `
    #       --exclude-module=tensorflow `
    #       --exclude-module=torch `
    #       --collect-all=PyQt5 `
    #       main.py
    #     if ($LASTEXITCODE -ne 0) {
    #       Write-Error "PyInstaller build failed"
    #       exit 1
    #     }
    
    - name: Build with PyInstaller using spec
      run: |
        pyinstaller annotation_tool.spec
    
    - name: Rename executable with version
      run: |
        $exePath = "dist/${{ env.APP_NAME }}.exe"
        $newExePath = "dist/${{ env.APP_NAME }}-v${{ env.APP_VERSION }}.exe"
        if (Test-Path $exePath) {
          Move-Item $exePath $newExePath
          Write-Host "Renamed to: $newExePath"
        } else {
          Write-Host "Warning: $exePath not found"
          Get-ChildItem dist
        }

    - name: List dist directory
      run: |
        Get-ChildItem dist
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APP_NAME }}-v${{ env.APP_VERSION }}
        path: dist/${{ env.APP_NAME }}-v${{ env.APP_VERSION }}.exe
        retention-days: 30
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/${{ env.APP_NAME }}-v${{ env.APP_VERSION }}.exe
        tag_name: v${{ env.APP_VERSION }}
        name: Release v${{ env.APP_VERSION }}
        body: |
          ## ${{ env.APP_NAME }} v${{ env.APP_VERSION }}
          
          ### Windows 可执行文件
          - 下载 `${{ env.APP_NAME }}.exe` 并运行
          - 无需安装 Python 环境
          
          ### 系统要求
          - Windows 10 或更高版本
          - 64位系统
          
          ### 功能
          - 支持图片标注
          - 支持视频标注
          - 多种标注模式