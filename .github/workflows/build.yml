name: Build Windows Executable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PyQt5 opencv-python numpy
    
    - name: Build with PyInstaller
      run: |
        pyinstaller --name=PetkitAnnotationTool ^
          --windowed ^
          --onefile ^
          --add-data="icons;icons" ^
          --add-data="config;config" ^
          --add-data="modes;modes" ^
          --add-data="core;core" ^
          --add-data="utils;utils" ^
          --hidden-import=PyQt5.QtCore ^
          --hidden-import=PyQt5.QtGui ^
          --hidden-import=PyQt5.QtWidgets ^
          --hidden-import=cv2 ^
          --hidden-import=numpy ^
          --icon=icons/app_icon.ico ^
          main.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: PetkitAnnotationTool-Windows
        path: dist/PetkitAnnotationTool.exe
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/PetkitAnnotationTool.exe