name: Build Windows Executable

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number'
        required: false
        default: '1.0.0'

env:
  APP_NAME: PetkitAnnotationTool
  VERSION: 1.0.0

jobs:
  build-windows:
    runs-on: windows-latest
    
    strategy:
      matrix:
        python-version: ['3.11']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~\AppData\Local\pip\Cache
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PyQt5 opencv-python numpy
        if (Test-Path requirements.txt) {
          pip install -r requirements.txt
        }
    
    - name: Create icons directory if not exists
      run: |
        if (!(Test-Path icons)) {
          New-Item -ItemType Directory -Path icons
        }
    
    # - name: Build with PyInstaller
    #   run: |
    #     pyinstaller --name=${{ env.APP_NAME }} `
    #       --windowed `
    #       --onefile `
    #       --add-data="icons;icons" `
    #       --add-data="config;config" `
    #       --add-data="modes;modes" `
    #       --add-data="core;core" `
    #       --add-data="utils;utils" `
    #       --add-data="$env:pythonLocation\Lib\site-packages\PyQt5\Qt5\plugins\platforms;platforms" `
    #       --hidden-import=PyQt5.QtCore `
    #       --hidden-import=PyQt5.QtGui `
    #       --hidden-import=PyQt5.QtWidgets `
    #       --hidden-import=cv2 `
    #       --hidden-import=numpy `
    #       --hidden-import=json `
    #       --hidden-import=imghdr `
    #       --exclude-module=tensorflow `
    #       --exclude-module=torch `
    #       --collect-all=PyQt5 `
    #       main.py
    #     if ($LASTEXITCODE -ne 0) {
    #       Write-Error "PyInstaller build failed"
    #       exit 1
    #     }
    
    - name: Build with PyInstaller using spec
      run: |
        pyinstaller annotation_tool.spec

    - name: List dist directory
      run: |
        Get-ChildItem dist
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APP_NAME }}-Windows-${{ github.run_number }}
        path: dist/${{ env.APP_NAME }}.exe
        retention-days: 30
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/${{ env.APP_NAME }}.exe
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        body: |
          ## ${{ env.APP_NAME }} v${{ github.ref_name }}
          
          ### Windows 可执行文件
          - 下载 `${{ env.APP_NAME }}.exe` 并运行
          - 无需安装 Python 环境
          
          ### 系统要求
          - Windows 10 或更高版本
          - 64位系统
          
          ### 功能
          - 支持图片标注
          - 支持视频标注
          - 多种标注模式